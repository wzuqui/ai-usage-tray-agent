name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    # Publica releases oficiais apenas no repositorio upstream. Pushes no main de
    # forks nao disparam build/assinatura (evita falha por secret ausente e
    # releases orfas que ninguem busca via OTA).
    if: github.repository == 'wzuqui/ai-usage-tray-agent'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            tauri_config: src-tauri/tauri.windows.conf.json
            artifact_glob: src-tauri/target/release/bundle/msi/*.msi
            sig_glob: src-tauri/target/release/bundle/msi/*.msi.sig
            artifact_name: dist-windows-latest
          - os: ubuntu-22.04
            tauri_config: src-tauri/tauri.linux.conf.json
            artifact_glob: src-tauri/target/release/bundle/appimage/*.AppImage
            sig_glob: src-tauri/target/release/bundle/appimage/*.AppImage.sig
            artifact_name: dist-ubuntu-22.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      # O updater compara semver; a versao precisa incrementar a cada build. Usa
      # o numero da execucao como patch (monotonico no upstream). As duas
      # plataformas leem o mesmo run_number -> mesma versao.
      - name: Set version (0.2.<run_number>)
        shell: bash
        run: |
          version="0.2.${{ github.run_number }}"
          tmp=$(mktemp)
          jq --arg v "$version" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json
          echo "Versao do build: $version"

      - name: Build distributable
        run: npx tauri build --config ${{ matrix.tauri_config }}
        env:
          # Assinatura dos artefatos do updater. Sem estas variaveis o build falha
          # (createUpdaterArtifacts: true). Cadastradas como secrets no upstream.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-release
          # Instalador (download manual) e a assinatura .sig (consumida pelo OTA).
          cp ${{ matrix.artifact_glob }} dist-release/
          cp ${{ matrix.sig_glob }} dist-release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-release/*
          if-no-files-found: error

  release:
    needs: build
    if: github.repository == 'wzuqui/ai-usage-tray-agent'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      # Monta o manifesto que o updater consulta. Descobre os nomes reais dos
      # artefatos e le o conteudo dos .sig; monta as URLs a partir dos basenames
      # (sem hardcode de nome/arch). Inclui so' as plataformas presentes.
      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          cd dist-release
          version="0.2.${{ github.run_number }}"
          base="https://github.com/wzuqui/ai-usage-tray-agent/releases/download/main-latest"
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          notes="Build automatica do main (${{ github.sha }})."
          platforms='{}'

          msi=$(ls *.msi 2>/dev/null | head -n1 || true)
          msi_sig=$(ls *.msi.sig 2>/dev/null | head -n1 || true)
          if [ -n "$msi" ] && [ -n "$msi_sig" ]; then
            platforms=$(echo "$platforms" | jq \
              --arg s "$(cat "$msi_sig")" --arg u "$base/$msi" \
              '. + {"windows-x86_64": {signature: $s, url: $u}}')
          fi

          appimage=$(ls *.AppImage 2>/dev/null | head -n1 || true)
          appimage_sig=$(ls *.AppImage.sig 2>/dev/null | head -n1 || true)
          if [ -n "$appimage" ] && [ -n "$appimage_sig" ]; then
            platforms=$(echo "$platforms" | jq \
              --arg s "$(cat "$appimage_sig")" --arg u "$base/$appimage" \
              '. + {"linux-x86_64": {signature: $s, url: $u}}')
          fi

          jq -n --arg v "$version" --arg d "$pub_date" --arg n "$notes" \
            --argjson p "$platforms" \
            '{version: $v, pub_date: $d, notes: $n, platforms: $p}' > latest.json

          echo "latest.json gerado:"
          cat latest.json

      # A release main-latest e' rolante e os nomes dos artefatos carregam a
      # versao (0.2.<run>), entao builds diferentes geram nomes diferentes e os
      # antigos nao sao sobrescritos. Apaga todos os assets atuais antes de
      # publicar os novos, mantendo a release so' com o conjunto da build atual.
      # Seguro para o OTA: os apps so' leem o latest.json (versao atual).
      - name: Limpa assets antigos da release rolling
        shell: bash
        run: |
          gh release view main-latest --repo "$GITHUB_REPOSITORY" \
            --json assets -q '.assets[].name' 2>/dev/null \
            | while read -r asset; do
                [ -n "$asset" ] || continue
                echo "removendo asset antigo: $asset"
                gh release delete-asset main-latest "$asset" \
                  --repo "$GITHUB_REPOSITORY" --yes || true
              done || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: AiUsageTrayAgent main-latest
          body: Build automatica do branch main para o commit `${{ github.sha }}`.
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist-release/*.msi
            dist-release/*.AppImage
            dist-release/*.sig
            dist-release/latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
