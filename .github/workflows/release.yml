name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            tauri_config: src-tauri/tauri.windows.conf.json
            artifact_glob: src-tauri/target/release/bundle/msi/*.msi
            artifact_name: dist-windows-latest
          - os: ubuntu-22.04
            tauri_config: src-tauri/tauri.linux.conf.json
            artifact_glob: src-tauri/target/release/bundle/appimage/*.AppImage
            artifact_name: dist-ubuntu-22.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build distributable
        run: npx tauri build --config ${{ matrix.tauri_config }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-release
          cp ${{ matrix.artifact_glob }} dist-release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: AiUsageTrayAgent main-latest
          body: Build automatica do branch main para o commit `${{ github.sha }}`.
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist-release/*.msi
            dist-release/*.AppImage
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
