name: release-installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-installers:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_name: windows-msi
            tauri_config: src-tauri/tauri.windows.conf.json
            artifact_path: src-tauri/target/release/bundle/msi/*.msi
          - platform: ubuntu-22.04
            artifact_name: linux-appimage
            tauri_config: src-tauri/tauri.linux.conf.json
            artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: "AiUsageTrayAgent v__VERSION__"
          releaseBody: "Instaladores gerados automaticamente para Windows e Linux (.msi e AppImage)."
          releaseDraft: false
          prerelease: false
          args: --config ${{ matrix.tauri_config }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
